<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ogabek Ahmadjonov</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #040816;
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* ANIMATED BG */

    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -2;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      animation: float 12s infinite ease-in-out;
    }

    .circle:nth-child(1) {
      width: 350px;
      height: 350px;
      background: rgba(0, 191, 255, 0.25);
      top: -80px;
      left: -80px;
    }

    .circle:nth-child(2) {
      width: 300px;
      height: 300px;
      background: rgba(123, 44, 255, 0.20);
      bottom: -100px;
      right: -50px;
      animation-delay: 3s;
    }

    .circle:nth-child(3) {
      width: 250px;
      height: 250px;
      background: rgba(0, 255, 213, 0.15);
      top: 40%;
      left: 50%;
      animation-delay: 5s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-35px);
      }
    }

    /* CONTAINER */

    .container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 1250px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 60px;
      padding: 55px;
      border-radius: 40px;

      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(18px);

      border: 1px solid rgba(255, 255, 255, 0.08);

      box-shadow:
        0 0 50px rgba(0, 0, 0, 0.5),
        inset 0 0 30px rgba(255, 255, 255, 0.03);

      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      padding: 1px;
      border-radius: 40px;
      background: linear-gradient(135deg,
          #00bfff,
          #7b2cff,
          #00ffd5);

      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    /* LEFT */

    .left {
      flex: 1;
      z-index: 5;
    }

    .top-tag {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 60px;
      background: rgba(255, 255, 255, 0.08);
      color: #00cfff;
      font-size: 14px;
      margin-bottom: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.04);
      }
    }

    h1 {
      font-size: 85px;
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: 2px;

      background: linear-gradient(to right, #ffffff, #7de3ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      font-size: 28px;
      letter-spacing: 6px;
      color: #8b8b8b;
      margin-top: 12px;
      margin-bottom: 16px;
    }

    .job {
      font-size: 23px;
      font-weight: 600;
      color: #00d5ff;
      margin-bottom: 28px;
    }

    .desc {
      color: #cfcfcf;
      line-height: 1.9;
      max-width: 650px;
      margin-bottom: 40px;
    }

    /* BUTTONS */

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 40px;
    }

    .btn {
      position: relative;
      overflow: hidden;

      padding: 16px 28px;
      border-radius: 18px;
      text-decoration: none;
      color: white;
      font-weight: 600;

      display: flex;
      align-items: center;
      gap: 12px;

      background: rgba(255, 255, 255, 0.06);

      border: 1px solid rgba(255, 255, 255, 0.08);

      transition: 0.45s;
      backdrop-filter: blur(10px);
    }

    .btn::before {
      content: '';
      position: absolute;
      width: 0%;
      height: 100%;
      background: linear-gradient(135deg, #00bfff, #7b2cff);
      left: 0;
      top: 0;
      transition: 0.5s;
      z-index: -1;
    }

    .btn:hover::before {
      width: 100%;
    }

    .btn:hover {
      transform: translateY(-6px) scale(1.04);
      box-shadow: 0 15px 35px rgba(0, 191, 255, 0.25);
    }

    .btn i {
      font-size: 20px;
      transition: 0.4s;
    }

    .btn:hover i {
      transform: rotate(10deg) scale(1.2);
    }

    /* CONTACT */

    .contact-title {
      font-size: 20px;
      margin-bottom: 18px;
      font-weight: 600;
    }

    .socials {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .social {
      width: 65px;
      height: 65px;
      border-radius: 22px;

      display: flex;
      align-items: center;
      justify-content: center;

      text-decoration: none;
      color: white;
      font-size: 24px;

      background: rgba(255, 255, 255, 0.06);

      border: 1px solid rgba(255, 255, 255, 0.08);

      transition: 0.5s;
      position: relative;
      overflow: hidden;
    }

    .social::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg,
          #00bfff,
          #7b2cff);

      transform: scale(0);
      transition: 0.5s;
      border-radius: 50%;
      z-index: -1;
    }

    .social:hover::before {
      transform: scale(1.5);
    }

    .social:hover {
      transform: translateY(-8px) rotate(5deg);
      box-shadow: 0 15px 35px rgba(0, 191, 255, 0.25);
    }

    .social:hover i {
      animation: shake 0.5s;
    }

    @keyframes shake {

      0%,
      100% {
        transform: rotate(0deg);
      }

      25% {
        transform: rotate(15deg);
      }

      50% {
        transform: rotate(-15deg);
      }

      75% {
        transform: rotate(10deg);
      }
    }

    /* RIGHT */

    .right {
      flex: 0.8;
      display: flex;
      justify-content: center;
      position: relative;
    }

    .image-box {
      width: 320px;
      height: 410px;
      border-radius: 35px;
      overflow: hidden;
      position: relative;

      border: 1px solid rgba(255, 255, 255, 0.08);

      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(0, 191, 255, 0.15);

      transition: 0.6s;
    }

    .image-box:hover {
      transform: scale(1.03) rotate(-1deg);
    }

    .image-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top,
          rgba(0, 0, 0, 0.4),
          transparent);
      z-index: 2;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.8s;
    }

    .image-box:hover img {
      transform: scale(1.08);
    }

    .floating {
      position: absolute;
      width: 120px;
      height: 120px;
      background: rgba(0, 191, 255, 0.18);
      border-radius: 50%;
      filter: blur(60px);
      top: -20px;
      right: -10px;
      animation: float 5s infinite ease-in-out;
    }

    /* RESPONSIVE */

    @media(max-width:1050px) {

      .card {
        flex-direction: column-reverse;
        text-align: center;
      }

      .buttons,
      .socials {
        justify-content: center;
      }

      h1 {
        font-size: 60px;
      }

      .image-box {
        width: 280px;
        height: 360px;
      }
    }

    @media(max-width:600px) {

      h1 {
        font-size: 45px;
      }

      h2 {
        font-size: 20px;
      }

      .job {
        font-size: 18px;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }

      .card {
        padding: 30px 20px;
      }
    }
  </style>

</head>
